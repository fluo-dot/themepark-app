<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resort Management</title>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="appwrite.js"></script>

<style>
:root {
  --bg: #f5f7fb;
  --sidebar: #0f172a;
  --sidebar2: #111c33;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --primary: #2563eb;
  --border: #e5e7eb;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: linear-gradient(180deg, var(--sidebar), var(--sidebar2));
  color: white;
  padding: 18px;
  display: flex;
  flex-direction: column;
  position: fixed;
  overflow-y: auto;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.back-btn-sidebar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
  flex-shrink: 0;
}

.back-btn-sidebar:hover {
  background: rgba(255, 255, 255, 0.2);
}

.resort-name {
  font-size: 14px;
  font-weight: 600;
  color: white;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: none;
  background: transparent;
  color: #cbd5e1;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.nav button:hover {
  background: rgba(255, 255, 255, 0.08);
  color: white;
}

.nav button.active {
  background: rgba(37, 99, 235, 0.25);
  color: white;
}

.bottom {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.bottom button {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: none;
  background: transparent;
  color: #cbd5e1;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.bottom button:hover {
  background: rgba(255, 255, 255, 0.08);
  color: white;
}

/* MAIN */
.main {
  margin-left: 240px;
  flex: 1;
  padding: 30px;
  overflow-y: auto;
  max-height: 100vh;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 30px;
}

h1 {
  font-size: 24px;
  color: var(--text);
  margin: 0;
}

/* PARKS GRID */
.parks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.park-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.park-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

.park-card h3 {
  font-size: 16px;
  margin-bottom: 8px;
  color: var(--text);
}

.park-card p {
  color: var(--muted);
  font-size: 13px;
}

.empty {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 60px 40px;
  text-align: center;
}

.empty p {
  color: var(--muted);
  margin-bottom: 20px;
}

/* FAB */
.fab {
  position: fixed;
  right: 40px;
  bottom: 40px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  transition: 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fab:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal-content h3 {
  font-size: 18px;
  margin-bottom: 20px;
  color: var(--text);
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
}

.form-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  transition: 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
}

.modal-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.btn {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  background: #1d4ed8;
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.btn-secondary:hover {
  background: #d1d5db;
}

/* TAB CONTENT */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.more-content {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  color: var(--muted);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="back-btn-sidebar" onclick="goBack()" title="Zurück zum Dashboard">
      <i data-lucide="arrow-left"></i>
    </button>
    <span class="resort-name" id="resortNameSidebar">Resort</span>
  </div>

  <div class="nav">
    <button class="active" onclick="switchTab('parks')">
      <i data-lucide="map-pin"></i> Parks
    </button>
    <button onclick="switchTab('more')">
      <i data-lucide="more-horizontal"></i> Mehr
    </button>
  </div>

  <div class="bottom">
    <button onclick="logout()">
      <i data-lucide="log-out"></i> Logout
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h1 id="resortTitle">Resort</h1>
  </div>

  <!-- PARKS TAB -->
  <div id="parks" class="tab-content active">
    <div id="parksContent"></div>
  </div>

  <!-- MORE TAB -->
  <div id="more" class="tab-content">
    <div class="more-content">
      <p>🚧 Weitere Optionen folgen in Kürze...</p>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openModal()" title="Neuen Park erstellen">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Neuen Park erstellen</h3>

    <div class="form-group">
      <label>Park Name</label>
      <input id="parkName" placeholder="z.B. Dragon Coaster Park" type="text">
    </div>

    <div class="modal-buttons">
      <button class="btn btn-primary" onclick="createPark()">Erstellen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  </div>
</div>

<script>

let resortId = null;
let currentUserId = null;

/* INIT */
async function init() {
  try {
    const user = await account.get();
    currentUserId = user.$id;

    const params = new URLSearchParams(location.search);
    resortId = params.get("id");

    if(!resortId) {
      window.location.href = "dashboard.html";
      return;
    }

    await loadResort();
    await loadParks();
    lucide.createIcons();
  } catch(err) {
    window.location.href = "auth.html";
  }
}

init();

/* LOAD RESORT NAME */
async function loadResort() {
  try {
    const resort = await databases.getDocument(
      DATABASE_ID,
      RESORTS_ID,
      resortId
    );

    document.getElementById("resortTitle").textContent = resort.name;
    document.getElementById("resortNameSidebar").textContent = resort.name;
  } catch(err) {
    console.error("Error loading resort:", err);
  }
}

/* LOAD PARKS */
async function loadParks() {
  try {
    const response = await databases.listDocuments(
      DATABASE_ID,
      PARKS_ID,
      [Appwrite.Query.equal("resortId", resortId)]
    );

    const parks = response.documents;
    let html = "";

    if(parks.length === 0) {
      html = `
        <div class="empty">
          <p>🎡 Keine Parks in diesem Resort</p>
          <p style="font-size: 12px; color: #94a3b8;">Klicke auf das + Symbol um einen neuen Park zu erstellen</p>
        </div>
      `;
    } else {
      html = '<div class="parks-grid">';
      parks.forEach(park => {
        html += `
          <div class="park-card" onclick="openPark('${park.$id}')">
            <h3>${park.name}</h3>
            <p>Klick zum Verwalten</p>
          </div>
        `;
      });
      html += '</div>';
    }

    document.getElementById("parksContent").innerHTML = html;
  } catch(err) {
    console.error("Error loading parks:", err);
  }
}

/* CREATE PARK */
async function createPark() {
  const name = document.getElementById("parkName").value.trim();

  if(!name) {
    alert("Bitte gib einen Park-Namen ein");
    return;
  }

  try {
    await databases.createDocument(
      DATABASE_ID,
      PARKS_ID,
      Appwrite.ID.unique(),
      {
        name: name,
        resortId: resortId,
        ownerId: currentUserId
      }
    );

    closeModal();
    document.getElementById("parkName").value = "";
    loadParks();
  } catch(err) {
    alert("Fehler beim Erstellen des Parks: " + err.message);
  }
}

/* OPEN PARK */
function openPark(parkId) {
  window.location.href = `park.html?id=${parkId}&resort=${resortId}`;
}

/* TAB SWITCHING */
function switchTab(tab) {
  // Hide all tabs
  document.querySelectorAll(".tab-content").forEach(el => {
    el.classList.remove("active");
  });

  // Remove active from all buttons
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.classList.remove("active");
  });

  // Show selected tab
  document.getElementById(tab).classList.add("active");

  // Add active to clicked button
  event.target.closest("button").classList.add("active");

  // Hide FAB for "Mehr" tab
  const fab = document.getElementById("fab");
  if(tab === "more") {
    fab.style.display = "none";
  } else {
    fab.style.display = "flex";
  }
}

/* MODAL */
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* NAVIGATION */
function goBack() {
  window.location.href = "dashboard.html";
}

/* LOGOUT */
async function logout() {
  try {
    await account.deleteSession("current");
    window.location.href = "auth.html";
  } catch(err) {
    console.error("Logout error:", err);
  }
}

</script>

</body>
</html>
