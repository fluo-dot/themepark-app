<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="appwrite.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --sidebar:#0f172a;
  --sidebar2:#111c33;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#94a3b8;
  --primary:#2563eb;
  --border:#e6eaf0;
}

/* GLOBAL */
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));
  color:white;
  padding:18px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  font-size:16px;
  margin-bottom:20px;
  color:white;
}

/* NAV */
.nav, .bottom{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.nav button,
.bottom button{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border:none;
  background:transparent;
  color:#cbd5e1;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.nav button:hover,
.bottom button:hover{
  background:rgba(255,255,255,0.08);
  color:white;
}

/* ACTIVE TAB */
.nav button.active{
  background:rgba(37,99,235,0.25);
  color:white;
}

/* BOTTOM */
.bottom{
  margin-top:auto;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* TITLE */
h2{
  margin-bottom:20px;
}

/* RESORT CARD */
.resort-card{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.resort-card:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* FAB */
.fab{
  position:fixed;
  right:30px;
  bottom:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--primary);
  color:white;
  border:none;
  font-size:28px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:16px;
  width:320px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

.btn{
  background:var(--primary);
  color:white;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>ThemePark</h2>

  <div class="nav">
    <button id="tab-home" class="active" onclick="showTab('home')">
      <i data-lucide="home"></i> Home
    </button>
  </div>

  <div class="bottom">
    <button onclick="alert('coming soon')">
      <i data-lucide="help-circle"></i> Help Center
    </button>

    <button onclick="alert('coming soon')">
      <i data-lucide="settings"></i> Einstellungen
    </button>

    <button onclick="logout()">
      <i data-lucide="log-out"></i> Logout
    </button>
  </div>

</div>

<!-- MAIN -->
<div class="main">
  <h2>Home</h2>
  <div id="content"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Resort erstellen</h3>
    <input id="resortName" placeholder="Name">
    <button class="btn" onclick="createResort()">Erstellen</button>
    <button class="btn" style="background:#e5e7eb;color:black" onclick="closeModal()">Abbrechen</button>
  </div>
</div>

<script>

let userId = null;

/* INIT */
async function init(){
  const user = await account.get();
  userId = user.$id;

  showHome();
  lucide.createIcons();
}

init();

/* TAB UI */
function setActive(tab){
  document.querySelectorAll(".nav button")
    .forEach(b => b.classList.remove("active"));

  const el = document.getElementById("tab-" + tab);
  if(el) el.classList.add("active");
}

function showTab(tab){
  setActive(tab);
  showHome();
}

/* HOME */
async function showHome(){

  const res = await databases.listDocuments(
    DATABASE_ID,
    RESORTS_ID,
    [Appwrite.Query.equal("ownerId", userId)]
  );

  let html = "";

  if(res.documents.length === 0){
    html += `<p style="color:#64748b;">Noch keine Resorts vorhanden</p>`;
  }

  res.documents.forEach(r => {
    html += `
      <div class="resort-card" onclick="openResort('${r.$id}')">
        <h3>${r.name}</h3>
        <p style="color:#64748b;">Klicken zum Öffnen</p>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

/* CREATE */
async function createResort(){

  const name = document.getElementById("resortName").value;
  if(!name) return;

  await databases.createDocument(
    DATABASE_ID,
    RESORTS_ID,
    Appwrite.ID.unique(),
    {
      name,
      ownerId: userId
    }
  );

  closeModal();
  showHome();
}

/* OPEN */
function openResort(id){
  window.location.href = "resort.html?id=" + id;
}

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* LOGOUT */
async function logout(){
  await account.deleteSession("current");
  window.location.href = "auth.html";
}

</script>

</body>
</html>
