<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park Management</title>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="appwrite.js"></script>

<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --primary: #667eea;
  --border: #e2e8f0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: var(--bg);
  min-height: 100vh;
}

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.back-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text);
}

.back-btn:hover {
  background: var(--border);
}

h1 {
  font-size: 28px;
  color: var(--text);
  flex: 1;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 30px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  padding: 12px 16px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* TAB CONTENT */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* SECTION */
.section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}

.section h3 {
  font-size: 16px;
  margin-bottom: 16px;
  color: var(--text);
  font-weight: 600;
}

/* ATTRACTIONS LIST */
.attractions-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.attraction-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.attraction-card h4 {
  font-size: 16px;
  margin-bottom: 8px;
  color: var(--text);
}

.attraction-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.wait-time {
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: 600;
  color: var(--primary);
}

.attraction-actions {
  display: flex;
  gap: 8px;
}

.attraction-actions button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.delete-btn {
  background: #fee2e2;
  color: #991b1b;
}

.delete-btn:hover {
  background: #fecaca;
}

/* EMPTY */
.empty {
  background: var(--bg);
  padding: 40px 20px;
  text-align: center;
  border-radius: 12px;
  color: var(--muted);
  font-size: 14px;
}

/* FORM */
.form-group {
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-group.full {
  grid-template-columns: 1fr;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  grid-column: 1 / -1;
}

.form-group input,
.form-group select {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  transition: all 0.2s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

/* BUTTONS */
.btn {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), #764ba2);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.btn-secondary {
  background: var(--border);
  color: var(--text);
}

.btn-secondary:hover {
  background: #cbd5e1;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: white;
  padding: 32px;
  border-radius: 16px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal-buttons {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.modal-buttons .btn {
  flex: 1;
}
</style>

</head>

<body>

<div class="main">

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" onclick="goBack()" title="Zurück">
      <i data-lucide="arrow-left"></i>
    </button>
    <h1 id="parkTitle">Park</h1>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('attractions')">
      <i data-lucide="map-pin"></i> Attraktionen
    </button>
    <button class="tab-btn" onclick="switchTab('openinghours')">
      <i data-lucide="clock"></i> Öffnungszeiten
    </button>
  </div>

  <!-- ATTRACTIONS TAB -->
  <div id="attractions" class="tab-content active">
    <div class="section">
      <h3>Attraktionen verwalten</h3>

      <div class="form-group full">
        <label>Neue Attraktion</label>
        <input id="attractionName" placeholder="Attraktion Name" type="text">
      </div>

      <div class="form-group">
        <label>Wartezeit (Minuten)</label>
        <input id="attractionWaitTime" placeholder="0" type="number" min="0">
      </div>

      <button class="btn btn-primary" onclick="addAttraction()">Attraktion hinzufügen</button>
    </div>

    <div class="section">
      <h3>Attraktionen</h3>
      <div id="attractionsList" class="attractions-list"></div>
    </div>
  </div>

  <!-- OPENING HOURS TAB -->
  <div id="openinghours" class="tab-content">
    <div class="section">
      <h3>Öffnungszeiten Slots erstellen</h3>

      <div class="form-group">
        <label>Von</label>
        <input id="slotFrom" type="time">
      </div>

      <div class="form-group">
        <label>Bis</label>
        <input id="slotTo" type="time">
      </div>

      <button class="btn btn-primary" onclick="addTimeSlot()">Slot hinzufügen</button>
    </div>

    <div class="section">
      <h3>Verfügbare Slots</h3>
      <div id="slotsList"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Modal</h3>
    <div id="modalContent"></div>
    <div class="modal-buttons">
      <button class="btn btn-primary" id="modalOkBtn" onclick="modalOk()">OK</button>
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
    </div>
  </div>
</div>

<script>

let parkId = null;
let resortId = null;
let currentUserId = null;
let attractions = [];
let timeSlots = [];

/* INIT */
async function init() {
  try {
    const user = await account.get();
    currentUserId = user.$id;

    const params = new URLSearchParams(location.search);
    parkId = params.get("id");
    resortId = params.get("resort");

    if(!parkId || !resortId) {
      window.location.href = "dashboard.html";
      return;
    }

    await loadPark();
    await loadAttractions();
    await loadTimeSlots();
    lucide.createIcons();
  } catch(err) {
    window.location.href = "auth.html";
  }
}

init();

/* LOAD PARK NAME */
async function loadPark() {
  try {
    const park = await databases.getDocument(
      DATABASE_ID,
      PARKS_ID,
      parkId
    );

    document.getElementById("parkTitle").textContent = park.name;
  } catch(err) {
    console.error("Error loading park:", err);
  }
}

/* LOAD ATTRACTIONS */
async function loadAttractions() {
  try {
    const response = await databases.listDocuments(
      DATABASE_ID,
      ATTRACTIONS_ID,
      [Appwrite.Query.equal("parkId", parkId)]
    );

    attractions = response.documents;
    renderAttractions();
  } catch(err) {
    console.error("Error loading attractions:", err);
  }
}

/* RENDER ATTRACTIONS */
function renderAttractions() {
  const container = document.getElementById("attractionsList");

  if(attractions.length === 0) {
    container.innerHTML = '<div class="empty">Keine Attraktionen vorhanden</div>';
    return;
  }

  let html = "";
  attractions.forEach(attr => {
    html += `
      <div class="attraction-card">
        <h4>${attr.name}</h4>
        <div class="attraction-info">
          <span>Wartezeit:</span>
          <div class="wait-time">${attr.waitTime} min</div>
        </div>
        <div class="attraction-actions">
          <button class="btn btn-secondary" style="flex:1" onclick="editAttraction('${attr.$id}', '${attr.waitTime}')">
            <i data-lucide="edit-2" style="width:14px;height:14px;"></i> Wartezeit ändern
          </button>
          <button class="delete-btn" onclick="deleteAttraction('${attr.$id}')">
            <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
          </button>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
  lucide.createIcons();
}

/* ADD ATTRACTION */
async function addAttraction() {
  const name = document.getElementById("attractionName").value.trim();
  const waitTime = parseInt(document.getElementById("attractionWaitTime").value) || 0;

  if(!name) {
    alert("Bitte gib einen Namen ein");
    return;
  }

  try {
    await databases.createDocument(
      DATABASE_ID,
      ATTRACTIONS_ID,
      Appwrite.ID.unique(),
      {
        parkId: parkId,
        name: name,
        waitTime: waitTime,
        status: "open"
      }
    );

    document.getElementById("attractionName").value = "";
    document.getElementById("attractionWaitTime").value = "";
    loadAttractions();
  } catch(err) {
    alert("Fehler: " + err.message);
  }
}

/* EDIT ATTRACTION */
function editAttraction(id, currentWaitTime) {
  const newTime = prompt("Neue Wartezeit (Minuten):", currentWaitTime);

  if(newTime !== null) {
    updateAttractionWaitTime(id, parseInt(newTime) || 0);
  }
}

async function updateAttractionWaitTime(id, newTime) {
  try {
    await databases.updateDocument(
      DATABASE_ID,
      ATTRACTIONS_ID,
      id,
      { waitTime: newTime }
    );

    loadAttractions();
  } catch(err) {
    alert("Fehler: " + err.message);
  }
}

/* DELETE ATTRACTION */
async function deleteAttraction(id) {
  if(confirm("Attraktion wirklich löschen?")) {
    try {
      await databases.deleteDocument(
        DATABASE_ID,
        ATTRACTIONS_ID,
        id
      );

      loadAttractions();
    } catch(err) {
      alert("Fehler: " + err.message);
    }
  }
}

/* TIME SLOTS */
async function loadTimeSlots() {
  try {
    const response = await databases.listDocuments(
      DATABASE_ID,
      TIMESLOTS_ID,
      [Appwrite.Query.equal("parkId", parkId)]
    );

    timeSlots = response.documents;
    renderTimeSlots();
  } catch(err) {
    console.error("Error loading time slots:", err);
  }
}

function renderTimeSlots() {
  const container = document.getElementById("slotsList");

  if(timeSlots.length === 0) {
    container.innerHTML = '<div class="empty">Keine Slots vorhanden</div>';
    return;
  }

  let html = "";
  timeSlots.forEach(slot => {
    html += `
      <div class="attraction-card" style="background:white;border:1px solid var(--border);">
        <h4>${slot.from} - ${slot.to}</h4>
        <button class="delete-btn" onclick="deleteTimeSlot('${slot.$id}')">
          <i data-lucide="trash-2" style="width:14px;height:14px;"></i> Löschen
        </button>
      </div>
    `;
  });

  container.innerHTML = html;
  lucide.createIcons();
}

/* ADD TIME SLOT */
async function addTimeSlot() {
  const from = document.getElementById("slotFrom").value;
  const to = document.getElementById("slotTo").value;

  if(!from || !to) {
    alert("Bitte beide Zeiten eingeben");
    return;
  }

  try {
    await databases.createDocument(
      DATABASE_ID,
      TIMESLOTS_ID,
      Appwrite.ID.unique(),
      {
        parkId: parkId,
        from: from,
        to: to,
        label: `${from} - ${to}`
      }
    );

    document.getElementById("slotFrom").value = "";
    document.getElementById("slotTo").value = "";
    loadTimeSlots();
  } catch(err) {
    alert("Fehler: " + err.message);
  }
}

/* DELETE TIME SLOT */
async function deleteTimeSlot(id) {
  if(confirm("Slot wirklich löschen?")) {
    try {
      await databases.deleteDocument(
        DATABASE_ID,
        TIMESLOTS_ID,
        id
      );

      loadTimeSlots();
    } catch(err) {
      alert("Fehler: " + err.message);
    }
  }
}

/* TAB SWITCHING */
function switchTab(tab) {
  document.querySelectorAll(".tab-content").forEach(el => {
    el.classList.remove("active");
  });

  document.querySelectorAll(".tab-btn").forEach(el => {
    el.classList.remove("active");
  });

  document.getElementById(tab).classList.add("active");
  event.target.classList.add("active");
}

/* MODAL */
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function modalOk() {
  closeModal();
}

/* NAVIGATION */
function goBack() {
  window.location.href = `resorts.html?id=${resortId}`;
}

</script>

</body>
</html>
