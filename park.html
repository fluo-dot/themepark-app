<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Park</title>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="appwrite.js"></script>

<style>
:root{
  --bg:#f5f7fb;
  --sidebar:#0f172a;
  --sidebar2:#111c33;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --primary:#2563eb;
  --border:#e6eaf0;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:230px;
  height:100vh;
  background:linear-gradient(180deg,var(--sidebar),var(--sidebar2));
  color:white;
  padding:18px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
}

.sidebar-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.back-btn-sidebar {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.back-btn-sidebar:hover {
  background: rgba(255, 255, 255, 0.2);
}

.park-name {
  font-size: 14px;
  font-weight: 600;
  color: white;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
  flex:1;
}

.nav button{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:12px;
  border:none;
  background:transparent;
  color:#cbd5e1;
  border-radius:10px;
  cursor:pointer;
  font-size: 14px;
  transition:0.2s;
}

.nav button:hover{
  background:rgba(255,255,255,0.08);
  color:white;
}

.nav button.active{
  background:rgba(37,99,235,0.25);
  color:white;
}

/* MAIN */
.main{
  margin-left:230px;
  height:100vh;
  overflow-y:auto;
  padding:30px 40px;
  box-sizing:border-box;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.content{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
}

/* TAB CONTENT */
.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* MONTH */
.month{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.month button{
  padding:6px 10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.weekday{
  font-size:12px;
  color:#64748b;
  text-align:center;
}

/* DAY */
.day{
  background:white;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  min-height:80px;
  cursor:pointer;
  transition:0.2s;
}

.day:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

/* SLOT BOX */
.slotBox{
  margin-bottom:15px;
  padding:15px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:320px;
}

select, input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

.btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary{background:#2563eb;color:white;}
.secondary{background:#e5e7eb;}

.waittime-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
}

.waittime-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.waittime-card h3 {
  margin: 0 0 10px 0;
  color: var(--text);
  font-size: 16px;
}

.waittime-input {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.waittime-input input {
  flex: 1;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

.waittime-input button {
  padding: 8px 16px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="back-btn-sidebar" onclick="goBack()" title="Zurück">
      <i data-lucide="arrow-left"></i>
    </button>
    <span class="park-name" id="parkNameSidebar">Park</span>
  </div>

  <div class="nav">
    <button class="active" onclick="switchTab('opening-hours')"><i data-lucide="clock"></i> Öffnungszeiten</button>
    <button onclick="switchTab('attractions')"><i data-lucide="map-pin"></i> Attraktionen</button>
    <button onclick="switchTab('waittime')"><i data-lucide="hourglass"></i> Wartezeiten</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- OPENING HOURS TAB -->
  <div id="opening-hours" class="tab-content active">
    <div class="header">
      <h2>Öffnungszeiten</h2>
    </div>

    <!-- SLOT CREATOR -->
    <div class="slotBox">
      <h3>Öffnungszeiten erstellen</h3>
      <div style="display:flex;gap:10px;">
        <input id="fromTime" type="time">
        <input id="toTime" type="time">
      </div>
      <button class="btn primary" onclick="addTimeSlot()">Hinzufügen</button>
      <div id="slotList" style="margin-top:10px;"></div>
    </div>

    <!-- CALENDAR -->
    <div class="content">
      <div class="month">
        <button onclick="prev()">←</button>
        <h3 id="monthLabel"></h3>
        <button onclick="next()">→</button>
      </div>
      <div id="calendar"></div>
    </div>
  </div>

  <!-- ATTRACTIONS TAB -->
  <div id="attractions" class="tab-content">
    <div class="header">
      <h2>Attraktionen</h2>
    </div>
    <div class="content">
      <p style="color: var(--muted); text-align: center; padding: 40px;">🎢 Attraktionsverwaltung folgt in Kürze...</p>
    </div>
  </div>

  <!-- WAITTIME TAB -->
  <div id="waittime" class="tab-content">
    <div class="header">
      <h2>Wartezeiten</h2>
    </div>
    <div id="waittimeContent" class="waittime-container"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Tag bearbeiten</h3>
    <select id="daySelect"></select>
    <button class="btn primary" onclick="saveDay()">Speichern</button>
    <button class="btn secondary" onclick="closeModal()">Abbrechen</button>
  </div>
</div>

<script>

let parkId;
let resortId;
let selectedDay = null;
let days = {};
let timeSlots = [];
let date = new Date();
let attractions = [];

const DB_ID = "themepark-dp";
const HOURS = "openinghours";
const SLOTS = "timeslots";
const ATTRACTIONS_ID = "attractions";

/* INIT */
async function init(){
  lucide.createIcons();

  const params = new URLSearchParams(location.search);
  parkId = params.get("id");
  resortId = params.get("resort");

  if (!parkId) {
    window.location.href = "resorts.html?id=" + resortId;
    return;
  }

  await loadParkName();
  await loadSlots();
  await loadDays();
  await loadAttractions();

  render();
}

init();

/* LOAD PARK NAME */
async function loadParkName() {
  try {
    const park = await databases.getDocument(
      DATABASE_ID,
      PARKS_ID,
      parkId
    );
    document.getElementById("parkNameSidebar").textContent = park.name;
  } catch(err) {
    console.error(err);
  }
}

/* LOAD ATTRACTIONS */
async function loadAttractions() {
  try {
    const res = await databases.listDocuments(
      DB_ID,
      ATTRACTIONS_ID,
      [Appwrite.Query.equal("parkId", parkId)]
    );
    attractions = res.documents;
    renderWaittime();
  } catch(err) {
    console.error(err);
  }
}

/* RENDER WAITTIME */
function renderWaittime() {
  let html = "";
  if (attractions.length === 0) {
    html = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">🎪 Noch keine Attraktionen hinzugefügt</div>';
  } else {
    attractions.forEach(attr => {
      html += `
        <div class="waittime-card">
          <h3>${attr.name}</h3>
          <p style="color: var(--muted); font-size: 13px; margin: 0;">Aktuelle Wartezeit</p>
          <div class="waittime-input">
            <input type="number" id="waittime-${attr.$id}" placeholder="Minuten" value="${attr.waittime || 0}" min="0">
            <button onclick="updateWaittime('${attr.$id}')">Update</button>
          </div>
        </div>
      `;
    });
  }
  document.getElementById("waittimeContent").innerHTML = html;
}

/* UPDATE WAITTIME */
async function updateWaittime(attractionId) {
  const waittime = parseInt(document.getElementById(`waittime-${attractionId}`).value) || 0;
  try {
    await databases.updateDocument(
      DB_ID,
      ATTRACTIONS_ID,
      attractionId,
      { waittime }
    );
  } catch(err) {
    console.error(err);
  }
}

/* LOAD SLOTS */
async function loadSlots(){
  try {
    const res = await databases.listDocuments(
      DB_ID,
      SLOTS,
      [Appwrite.Query.equal("parkId", parkId)]
    );
    timeSlots = res.documents.map(d => d.label);
  } catch(err){
    console.error(err);
  }
}

/* ADD SLOT */
async function addTimeSlot(){
  const from = document.getElementById("fromTime").value;
  const to = document.getElementById("toTime").value;

  if(!from || !to) return;

  const label = `${from} - ${to}`;

  try {
    await databases.createDocument(
      DB_ID,
      SLOTS,
      Appwrite.ID.unique(),
      {
        parkId,
        from,
        to,
        label
      }
    );

    timeSlots.push(label);
    document.getElementById("fromTime").value = "";
    document.getElementById("toTime").value = "";
  } catch(err){
    console.error(err);
  }
}

/* LOAD DAYS */
async function loadDays(){
  try {
    const res = await databases.listDocuments(
      DB_ID,
      HOURS,
      [Appwrite.Query.equal("parkId", parkId)]
    );

    days = {};

    res.documents.forEach(d=>{
      days[d.date] = d;
    });

  } catch(err){
    console.error(err);
  }
}

/* RENDER CALENDAR */
function render(){
  const y = date.getFullYear();
  const m = date.getMonth();

  document.getElementById("monthLabel").innerText =
    date.toLocaleString("de-DE",{month:"long",year:"numeric"});

  const first = new Date(y,m,1);
  const last = new Date(y,m+1,0);

  const start = (first.getDay()+6)%7;

  let html = `<div class="calendar">`;

  const daysW = ["Mo","Di","Mi","Do","Fr","Sa","So"];
  daysW.forEach(d=> html += `<div class="weekday">${d}</div>`);

  for(let i=0;i<start;i++) html += `<div></div>`;

  for(let i=1;i<=last.getDate();i++){
    const key = `${y}-${m+1}-${i}`;
    const d = days[key];

    let icon="➖";
    let text="Keine Angabe";
    let color="#94a3b8";

    if(d?.type==="open"){
      icon="🟢";
      text=d.time;
      color="#16a34a";
    }

    if(d?.type==="closed"){
      icon="🔴";
      text="Geschlossen";
      color="#dc2626";
    }

    html += `
      <div class="day" onclick="openDay('${key}')">
        <strong>${i}</strong>
        <div style="color:${color};font-size:11px;margin-top:6px;">
          ${icon} ${text}
        </div>
      </div>
    `;
  }

  html += `</div>`;
  document.getElementById("calendar").innerHTML = html;
}

/* MONTH */
function prev(){ date.setMonth(date.getMonth()-1); render(); }
function next(){ date.setMonth(date.getMonth()+1); render(); }

/* MODAL */
function openDay(key){
  selectedDay = key;

  let options = `
    <option value="none">Keine Angabe</option>
    <option value="closed">Geschlossen</option>
  `;

  timeSlots.forEach(t=>{
    options += `<option value="${t}">${t}</option>`;
  });

  document.getElementById("daySelect").innerHTML = options;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* TAB SWITCHING */
function switchTab(tab) {
  // Hide all tabs
  document.querySelectorAll(".tab-content").forEach(el => {
    el.classList.remove("active");
  });

  // Remove active from all buttons
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.classList.remove("active");
  });

  // Show selected tab
  document.getElementById(tab).classList.add("active");

  // Add active to clicked button
  event.target.closest("button").classList.add("active");
}

/* SAVE */
async function saveDay(){
  const val = document.getElementById("daySelect").value;

  let type="none";
  let time="";

  if(val==="closed") type="closed";
  else if(val!=="none"){
    type="open";
    time=val;
  }

  try {
    const existing = await databases.listDocuments(
      DB_ID,
      HOURS,
      [
        Appwrite.Query.equal("parkId", parkId),
        Appwrite.Query.equal("date", selectedDay)
      ]
    );

    if(existing.documents.length>0){
      await databases.updateDocument(
        DB_ID,
        HOURS,
        existing.documents[0].$id,
        {type,time}
      );
    } else {
      await databases.createDocument(
        DB_ID,
        HOURS,
        Appwrite.ID.unique(),
        {
          parkId,
          date:selectedDay,
          type,
          time
        }
      );
    }

    days[selectedDay]={type,time};

    closeModal();
    render();
  } catch(err){
    console.error(err);
  }
}

/* GO BACK */
function goBack() {
  if (resortId) {
    window.location.href = `resorts.html?id=${resortId}`;
  } else {
    window.location.href = "dashboard.html";
  }
}

</script>

</body>
</html>
