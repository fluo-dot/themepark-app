<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThemePark - Login & Register</title>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="appwrite.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f9fafb;
  color: #111827;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
  width: 100%;
  max-width: 400px;
  padding: 40px 30px;
}

h1 {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 30px;
  color: #0f172a;
  letter-spacing: 0.5px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 30px;
  border-bottom: 1px solid #e5e7eb;
}

.tab-btn {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: #9ca3af;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.3s ease;
}

.tab-btn:hover {
  color: #6b7280;
}

.tab-btn.active {
  color: #2563eb;
  border-bottom-color: #2563eb;
}

/* FORM */
.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: #374151;
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 14px;
  background: white;
  transition: all 0.2s ease;
  font-family: Arial, sans-serif;
}

.form-group input::placeholder,
.form-group select::placeholder {
  color: #d1d5db;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.btn {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 24px;
  transition: all 0.2s ease;
  letter-spacing: 0.3px;
}

.btn:hover:not(:disabled) {
  background: #1d4ed8;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
}

.btn:active:not(:disabled) {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* MESSAGES */
.hidden {
  display: none !important;
}

.error {
  background: #fef2f2;
  color: #991b1b;
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 13px;
  border-left: 4px solid #dc2626;
  line-height: 1.5;
}

.success {
  background: #f0fdf4;
  color: #15803d;
  padding: 12px 14px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 13px;
  border-left: 4px solid #16a34a;
  line-height: 1.5;
}

/* ANIMATIONS */
.form-enter {
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="container">

  <h1>ThemePark Control</h1>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showLogin()">Login</button>
    <button class="tab-btn" onclick="showRegister()">Registrieren</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm" class="form-enter">
    <div id="loginError" class="error hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="name@example.com">
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input id="loginPassword" type="password" placeholder="••••••••">
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Anmelden</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="hidden form-enter">
    <div id="registerError" class="error hidden"></div>
    <div id="registerSuccess" class="success hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="name@example.com">
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input id="regPassword" type="password" placeholder="••••••••">
    </div>

    <div class="form-group">
      <label>Passwort bestätigen</label>
      <input id="regPasswordConfirm" type="password" placeholder="••••••••">
    </div>

    <div class="form-group">
      <label>Rolle</label>
      <select id="roleSelect">
        <option value="park_manager">Park Manager</option>
        <option value="waittime_manager">Wartezeit Manager</option>
      </select>
    </div>

    <button class="btn" id="registerBtn" onclick="register()">Registrieren</button>
  </div>

</div>

<script>

let loginBusy = false;
let registerBusy = false;

/* TAB SWITCHING */
function showLogin() {
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("registerForm").classList.add("hidden");
  document.querySelectorAll(".tab-btn")[0].classList.add("active");
  document.querySelectorAll(".tab-btn")[1].classList.remove("active");
  clearErrors();
}

function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
  document.querySelectorAll(".tab-btn")[0].classList.remove("active");
  document.querySelectorAll(".tab-btn")[1].classList.add("active");
  clearErrors();
}

function clearErrors() {
  document.getElementById("loginError").classList.add("hidden");
  document.getElementById("registerError").classList.add("hidden");
  document.getElementById("registerSuccess").classList.add("hidden");
}

/* LOGIN */
async function login() {
  if(loginBusy) return;
  loginBusy = true;

  const loginBtn = document.getElementById("loginBtn");
  const originalText = loginBtn.textContent;
  loginBtn.textContent = "Wird geladen...";
  loginBtn.disabled = true;

  try {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    if(!email || !password) {
      throw new Error("Bitte Email und Passwort eingeben");
    }

    // Alte Session löschen
    try {
      await account.deleteSession("current");
    } catch(e) {
      // Ignorieren wenn keine Session existiert
    }

    // Neue Session erstellen
    await account.createEmailPasswordSession(email, password);

    // Benutzer abrufen
    const user = await account.get();

    // Profil abrufen
    const profile = await databases.listDocuments(
      DATABASE_ID,
      PROFILES_ID,
      [Appwrite.Query.equal("userId", user.$id)]
    );

    if(profile.documents.length === 0) {
      throw new Error("Benutzerprofil nicht gefunden");
    }

    const role = profile.documents[0].role;

    // Redirect basierend auf Rolle
    if(role === "park_manager") {
      window.location.href = "dashboard.html";
    } else if(role === "waittime_manager") {
      window.location.href = "waittime-dashboard.html";
    } else {
      throw new Error("Unbekannte Benutzerrolle");
    }

  } catch(err) {
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = err.message;
    errorEl.classList.remove("hidden");
    loginBtn.textContent = originalText;
    loginBtn.disabled = false;
    loginBusy = false;
  }
}

/* REGISTER */
async function register() {
  if(registerBusy) return;
  registerBusy = true;

  const registerBtn = document.getElementById("registerBtn");
  const originalText = registerBtn.textContent;
  registerBtn.textContent = "Wird registriert...";
  registerBtn.disabled = true;

  try {
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const passwordConfirm = document.getElementById("regPasswordConfirm").value;
    const role = document.getElementById("roleSelect").value;

    // Validierung
    if(!email || !password || !passwordConfirm) {
      throw new Error("Alle Felder sind erforderlich");
    }

    if(password !== passwordConfirm) {
      throw new Error("Passwörter stimmen nicht überein");
    }

    if(password.length < 8) {
      throw new Error("Passwort muss mindestens 8 Zeichen lang sein");
    }

    if(!email.includes("@")) {
      throw new Error("Bitte gib eine gültige Email-Adresse ein");
    }

    // Benutzer erstellen
    const user = await account.create(
      Appwrite.ID.unique(),
      email,
      password
    );

    // Profil erstellen
    await databases.createDocument(
      DATABASE_ID,
      PROFILES_ID,
      Appwrite.ID.unique(),
      {
        userId: user.$id,
        role: role
      }
    );

    // Erfolgsmeldung zeigen
    const successEl = document.getElementById("registerSuccess");
    successEl.textContent = "✓ Registrierung erfolgreich! Bitte melde dich jetzt an.";
    successEl.classList.remove("hidden");

    // Formular leeren
    document.getElementById("regEmail").value = "";
    document.getElementById("regPassword").value = "";
    document.getElementById("regPasswordConfirm").value = "";

    // Nach 2 Sekunden zum Login wechseln
    setTimeout(() => {
      showLogin();
    }, 2000);

  } catch(err) {
    const errorEl = document.getElementById("registerError");
    errorEl.textContent = err.message;
    errorEl.classList.remove("hidden");
    registerBtn.textContent = originalText;
    registerBtn.disabled = false;
    registerBusy = false;
  }
}

</script>

</body>
</html>
