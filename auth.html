<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Auth</title>

<style>
body { font-family: Arial; background:#f9fafb; margin:0; }
.container { max-width:420px; margin:80px auto; background:white; padding:20px; border-radius:12px; }
input, select { width:100%; padding:12px; margin-top:10px; }
button { width:100%; padding:12px; margin-top:15px; background:#2563eb; color:white; border:none; border-radius:8px; }
.tabs { display:flex; justify-content:space-between; margin-bottom:20px; }
.hidden { display:none; }
</style>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="appwrite.js"></script>

</head>

<body>

<div class="container">

<div class="tabs">
  <button onclick="showLogin()">Login</button>
  <button onclick="showRegister()">Register</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="loginEmail" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="hidden">
  <input id="regEmail" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Passwort">

  <select id="role">
    <option value="manager">Park Manager</option>
    <option value="waittime">Waittime Manager</option>
  </select>

  <button onclick="register()">Registrieren</button>
</div>

</div>

<script>

function showLogin(){
  loginBox.classList.remove("hidden");
  registerBox.classList.add("hidden");
}

function showRegister(){
  registerBox.classList.remove("hidden");
  loginBox.classList.add("hidden");
}

let busy = false;

/* REGISTER */
async function register(){
  if(busy) return;
  busy = true;

  try {

    const email = regEmail.value;
    const password = regPassword.value;
    const role = document.getElementById("role").value;

    const user = await account.create(
      Appwrite.ID.unique(),
      email,
      password
    );

    await databases.createDocument(
      DATABASE_ID,
      PROFILES_ID,
      Appwrite.ID.unique(),
      {
        userId: user.$id,
        role: role
      }
    );

    alert("Registriert ✔");

  } catch(err){
    alert(err.message);
  }

  busy = false;
}

/* LOGIN */
async function login(){
  if(busy) return;
  busy = true;

  try {

    await account.createEmailPasswordSession(
      loginEmail.value,
      loginPassword.value
    );

    const user = await account.get();

    const profile = await databases.listDocuments(
      DATABASE_ID,
      PROFILES_ID,
      [Appwrite.Query.equal("userId", user.$id)]
    );

    const role = profile.documents[0].role;

    if(role === "manager"){
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "waittime.html";
    }

  } catch(err){
    alert(err.message);
  }

  busy = false;
}

</script>

</body>
</html>
