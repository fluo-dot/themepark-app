<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThemePark - Login & Register</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 420px;
  padding: 40px;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo h1 {
  color: #667eea;
  font-size: 28px;
  margin-bottom: 8px;
}

.logo p {
  color: #64748b;
  font-size: 14px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  border-bottom: 1px solid #e2e8f0;
}

.tab-btn {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: #64748b;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.3s;
}

.tab-btn.active {
  color: #667eea;
  border-bottom-color: #667eea;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #334155;
  font-size: 14px;
  font-weight: 500;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  transition: all 0.3s;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 20px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.hidden {
  display: none;
}

.error {
  background: #fee2e2;
  color: #991b1b;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  border-left: 4px solid #dc2626;
}

.success {
  background: #dcfce7;
  color: #15803d;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 14px;
  border-left: 4px solid #16a34a;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
<script src="appwrite.js"></script>

</head>

<body>

<div class="container">

  <div class="logo">
    <h1>🎢 ThemePark</h1>
    <p>Management System</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showLogin()">Login</button>
    <button class="tab-btn" onclick="showRegister()">Registrieren</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div id="loginError" class="error hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="deine@email.com">
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input id="loginPassword" type="password" placeholder="••••••••">
    </div>

    <button class="btn" id="loginBtn" onclick="login()">Login</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="hidden">
    <div id="registerError" class="error hidden"></div>
    <div id="registerSuccess" class="success hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="deine@email.com">
    </div>

    <div class="form-group">
      <label>Passwort</label>
      <input id="regPassword" type="password" placeholder="••••••••">
    </div>

    <div class="form-group">
      <label>Passwort wiederholen</label>
      <input id="regPasswordConfirm" type="password" placeholder="••••••••">
    </div>

    <div class="form-group">
      <label>Rolle</label>
      <select id="roleSelect">
        <option value="park_manager">Park Manager</option>
        <option value="waittime_manager">Waittime Manager</option>
      </select>
    </div>

    <button class="btn" id="registerBtn" onclick="register()">Registrieren</button>
  </div>

</div>

<script>

let loginBusy = false;
let registerBusy = false;

/* TAB SWITCHING */
function showLogin() {
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("registerForm").classList.add("hidden");
  document.querySelectorAll(".tab-btn")[0].classList.add("active");
  document.querySelectorAll(".tab-btn")[1].classList.remove("active");
  clearErrors();
}

function showRegister() {
  document.getElementById("loginForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
  document.querySelectorAll(".tab-btn")[0].classList.remove("active");
  document.querySelectorAll(".tab-btn")[1].classList.add("active");
  clearErrors();
}

function clearErrors() {
  document.getElementById("loginError").classList.add("hidden");
  document.getElementById("registerError").classList.add("hidden");
  document.getElementById("registerSuccess").classList.add("hidden");
}

/* LOGIN */
async function login() {
  if(loginBusy) return;
  loginBusy = true;

  const loginBtn = document.getElementById("loginBtn");
  loginBtn.textContent = "Wird geladen...";
  loginBtn.disabled = true;

  try {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    if(!email || !password) {
      throw new Error("Email und Passwort sind erforderlich");
    }

    // Create session
    await account.createEmailPasswordSession(email, password);

    // Get user
    const user = await account.get();

    // Get user profile
    const profile = await databases.listDocuments(
      DATABASE_ID,
      PROFILES_ID,
      [Appwrite.Query.equal("userId", user.$id)]
    );

    if(profile.documents.length === 0) {
      throw new Error("Benutzerprofil nicht gefunden");
    }

    const role = profile.documents[0].role;

    // Redirect based on role
    if(role === "park_manager") {
      window.location.href = "dashboard.html";
    } else if(role === "waittime_manager") {
      window.location.href = "waittime-dashboard.html";
    } else {
      throw new Error("Unbekannte Benutzerrolle");
    }

  } catch(err) {
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = err.message;
    errorEl.classList.remove("hidden");
  } finally {
    loginBtn.textContent = "Login";
    loginBtn.disabled = false;
    loginBusy = false;
  }
}

/* REGISTER */
async function register() {
  if(registerBusy) return;
  registerBusy = true;

  const registerBtn = document.getElementById("registerBtn");
  registerBtn.textContent = "Wird registriert...";
  registerBtn.disabled = true;

  try {
    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const passwordConfirm = document.getElementById("regPasswordConfirm").value;
    const role = document.getElementById("roleSelect").value;

    if(!email || !password || !passwordConfirm) {
      throw new Error("Alle Felder sind erforderlich");
    }

    if(password !== passwordConfirm) {
      throw new Error("Passwörter stimmen nicht überein");
    }

    if(password.length < 8) {
      throw new Error("Passwort muss mindestens 8 Zeichen lang sein");
    }

    // Create user account
    const user = await account.create(
      Appwrite.ID.unique(),
      email,
      password
    );

    // Create user profile
    await databases.createDocument(
      DATABASE_ID,
      PROFILES_ID,
      Appwrite.ID.unique(),
      {
        userId: user.$id,
        role: role
      }
    );

    // Show success message
    const successEl = document.getElementById("registerSuccess");
    successEl.textContent = "✓ Registrierung erfolgreich! Du kannst dich jetzt einloggen.";
    successEl.classList.remove("hidden");

    // Clear form
    document.getElementById("regEmail").value = "";
    document.getElementById("regPassword").value = "";
    document.getElementById("regPasswordConfirm").value = "";

    // Switch to login after 2 seconds
    setTimeout(() => {
      showLogin();
    }, 2000);

  } catch(err) {
    const errorEl = document.getElementById("registerError");
    errorEl.textContent = err.message;
    errorEl.classList.remove("hidden");
  } finally {
    registerBtn.textContent = "Registrieren";
    registerBtn.disabled = false;
    registerBusy = false;
  }
}

</script>

</body>
</html>
